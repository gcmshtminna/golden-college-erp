<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Admission Form</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Golden College Admission Portal</h1>
<p>Online Application Form</p>
</header>

<section class="form-section">

<h2>Student Application Form</h2>

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter full name">

<label>Date of Birth</label>
<input type="date">

<label>Gender</label>
<select>
<option>Male</option>
<option>Female</option>
</select>

<label>Phone Number</label>
<input type="tel" placeholder="e.g 080xxxxxxx">

<label>Email Address</label>
<input type="email" placeholder="example@gmail.com">

<label>Home Address</label>
<input type="text">

<label>State of Origin</label>
<input type="text">

<label>Local Government Area</label>
<input type="text">

<label>Select Department</label>
<select>
<option>CHEW</option>
<option>Public Health</option>
<option>X-Ray & Imaging</option>
<option>Medical Laboratory</option>
<option>Pharmacy Technician</option>
<option>Health Education</option>
<option>Family Health</option>
</select>

<button type="submit">Submit Application</button>

</form>

</section>

<footer>
<p>© 2026 Golden College of Medical Science & Health Technology</p>
</footer>

</body>
</html>
