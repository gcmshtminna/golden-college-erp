<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden College Online Admission Form</title>
<link rel="stylesheet" href="style.css">
</head>
<script type="module" src="admission.js"></script>
<body>

<header>
<h1>Golden College of Medical Science & Health Technology</h1>
<p>Online Admission Application Form</p>
</header>

<section class="form-section">

<h2>Personal Information</h2>

<form>

<label>Full Name</label>
<input type="text" required>

<label>Date of Birth</label>
<input type="date">

<label>Sex</label>
<select>
<option>Male</option>
<option>Female</option>
</select>

<label>Nationality</label>
<input type="text">

<label>Place of Birth</label>
<input type="text">

<label>State of Origin</label>
<input type="text">

<label>Local Government Area</label>
<input type="text">

<label>Marital Status</label>
<select>
<option>Single</option>
<option>Married</option>
</select>

<label>Religion</label>
<input type="text">

<label>Phone Number</label>
<input type="tel">

<label>Email Address</label>
<input type="email">

<label>Postal Address</label>
<textarea rows="3"></textarea>

<label>Parent / Guardian Name</label>
<input type="text">

<h2>Academic Information</h2>

<label>Examination Type</label>
<select id="examType">
<option>WAEC</option>
<option>NECO</option>
<option>NABTEB</option>
<option>GCE</option>
</select>

<label>Subjects and Grades</label>
<textarea id="subjectsGrades" rows="6" placeholder="Example: English - Credit, Mathematics - Credit"></textarea>

<h2>Course Selection</h2>

<label>Select Course</label>
<select id="course">
<option>Community Health (CHEW)</option>
<option>Junior Community Health (JCHEW)</option>
<option>Public Health</option>
<option>X-Ray & Medical Imaging</option>
<option>Medical Laboratory Technician</option>
<option>Pharmacy Technician</option>
<option>Health Education & Promotion</option>
<option>Family Health Care</option>
<option>Health Information Management</option>
</select>

<h2>Document Uploads</h2>

<label>Passport Photograph</label>
<input type="file" id="passportPhoto">

<label>Birth Certificate</label>
<input type="file" id="birthCertificate">

<label>Educational Certificate</label>
<input type="file" id="educationalCertificate">

<label>Testimonial</label>
<input type="file" id="testimonial">

<label>Reference Letter</label>
<input type="file" id="referenceLetter">

<button type="submit">Submit Application</button>2>
